# Node/TypeScript project profile for spechub
# Used by /spechub:init to generate openspec/project.yaml

commands:
  test: "npm test"
  test_collect: null
  build: "npm run build"
  lint: "npm run lint -- --fix"
  typecheck: "npx tsc --noEmit"
  format: "npx prettier --write ."

directories:
  source: "src/"
  tests: "tests/"

test_markers:
  exclude: null

venv: null

frontend:
  dev_server_url: "http://localhost:3000"
  dev_server_check: "curl -s -o /dev/null -w '%{http_code}' http://localhost:3000"
  framework: "react"
